# Docker Compose override — MariaDB backend
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.mariadb.yml up -d
#
# Set MARIADB_PASSWORD in your .env file or shell environment, then Compose
# will expand it in the DATABASE_URL below.  Example .env entries:
#   MARIADB_PASSWORD=your_secure_password
#
# The PyMySQL driver must be present in the image.  Before building, add the
# mariadb extra to the project and regenerate the lockfile:
#   uv sync --extra mariadb
#   docker compose build polly

services:
  mariadb:
    image: mariadb:11
    container_name: polly-mariadb
    environment:
      MARIADB_DATABASE: polly
      MARIADB_USER: polly
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-polly_db_pass}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-polly_root_pass}
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - polly-network

  polly:
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql+pymysql://polly:${MARIADB_PASSWORD:-polly_db_pass}@mariadb:3306/polly

volumes:
  mariadb_data:
    driver: local
