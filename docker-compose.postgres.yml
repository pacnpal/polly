# Docker Compose override — PostgreSQL backend
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#
# POSTGRES_PASSWORD must be set in your .env file or shell environment.
# Compose will error out if the variable is missing.  Example .env entry:
#   POSTGRES_PASSWORD=your_secure_password
#
# The psycopg2 driver must be present in the image.  Before building, add the
# postgres extra to the project and regenerate the lockfile:
#   uv sync --extra postgres
#   docker compose build polly

services:
  postgres:
    image: postgres:16-alpine
    container_name: polly-postgres
    environment:
      POSTGRES_DB: polly
      POSTGRES_USER: polly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env or shell}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polly -d polly"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - polly-network

  polly:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://polly:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env or shell}@postgres:5432/polly

volumes:
  postgres_data:
    driver: local
