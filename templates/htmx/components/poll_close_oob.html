{# Response for closing a poll from a card.
   Primary: replaces #poll-card-{poll_id} with the updated (now-closed) card.
   OOB:     drops a success alert into #inline-messages.
#}
{% include "htmx/components/_poll_card.html" %}

<div id="inline-messages" hx-swap-oob="innerHTML">
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i>{{ success_message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>
